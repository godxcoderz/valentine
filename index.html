<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sarim ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff4e88, #ff8fab);
        overflow: hidden;
        color: white;
        text-align: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: fadeIn 2s ease;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 20px;
        min-height: 60px;
    }

    p {
        margin-bottom: 30px;
        font-size: 18px;
        opacity: 0.9;
    }

    .buttons {
        position: relative;
        height: 60px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
        position: absolute;
    }

    .yes {
        background: white;
        color: #ff4e88;
        left: 30%;
    }

    .yes:hover {
        transform: scale(1.1);
    }

    .no {
        background: #ff1e56;
        color: white;
        right: 30%;
    }

    .heart {
        position: absolute;
        font-size: 20px;
        animation: float 6s linear infinite;
        opacity: 0.6;
    }

    @keyframes float {
        0% { transform: translateY(100vh); }
        100% { transform: translateY(-10vh); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .final-message {
        font-size: 24px;
        margin-top: 20px;
        display: none;
        animation: fadeIn 1.5s ease forwards;
    }
</style>
</head>
<body>

<div class="container">
    <h1 id="typing"></h1>
    <p>Every moment with you feels like magic.</p>

    <div class="buttons">
        <button class="yes" onclick="sayYes()">Yes ❤️</button>
        <button class="no" onmouseover="moveNo()">No 🙈</button>
    </div>

    <div class="final-message" id="finalMessage">
        You just made me the happiest person alive, Sarim ❤️  
        Happy Valentine’s Day 💍
    </div>
</div>

<script>
    // Typing Effect
    const text = "Sarim, will you be my Valentine?";
    let index = 0;

    function typeEffect() {
        if (index < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, 60);
        }
    }

    typeEffect();

    // Yes Button Action
    function sayYes() {
        document.querySelector(".buttons").style.display = "none";
        document.getElementById("finalMessage").style.display = "block";
        createHearts(30);
    }

    // No Button Runs Away
    function moveNo() {
        const button = document.querySelector(".no");
        const x = Math.random() * 300 - 150;
        const y = Math.random() * 200 - 100;
        button.style.transform = `translate(${x}px, ${y}px)`;
    }

    // Floating Hearts
    function createHearts(count) {
        for (let i = 0; i < count; i++) {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);
        }
    }
</script>

</body>
</html>
